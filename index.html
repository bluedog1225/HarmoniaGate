<!DOCTYPE html>

    <style>
        /* [1. Core UI/UX Design] */
        body { 
            font-family: 'Nanum Myeongjo', serif; margin: 0; padding: 0;

            display: flex; justify-content: center; align-items: flex-start; min-height: 100vh;
        }

        #intro-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #100e0c; z-index: 2000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;

        .seal-button img { width: 120px; filter: sepia(1) brightness(0.8); animation: pulse 2s infinite; }

        #container {
            width: 900px; margin: 50px 0; background-color: #f7f3e9; 
            background-image: url('https://www.transparenttextures.com/patterns/paper-fibers.png');
            border: 1px solid #d4c5a9; padding: 80px 60px; box-sizing: border-box; 
            box-shadow: 0 15px 50px rgba(0,0,0,0.5); opacity: 0; transform: translateY(30px); transition: 1.5s ease-out;
        }
        body.entered #container { opacity: 1; transform: translateY(0); }

        /* [2. Header & Navigation] */
        header { text-align: center; border-bottom: 2px double #d4c5a9; padding-bottom: 40px; margin-bottom: 45px; }
        .main-logo { font-family: 'Great Vibes', cursive; font-size: 80px; margin: 0; color: #5e4d31; }
        .sub-title { font-size: 11px; letter-spacing: 12px; color: #8e7a56; font-weight: bold; text-transform: uppercase; }

        nav a:hover, nav a.active { color: #332a1b; border-bottom: 2px solid #8e5a31; }

        /* [3. Section Specific Styles] */
        section { display: none; animation: fadeIn 0.8s forwards; }
        section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .rank-table { width: 100%; border-collapse: collapse; margin-top: 25px; }
        .rank-table th, .rank-table td { padding: 15px; border-bottom: 1px solid rgba(142, 90, 49, 0.2); text-align: left; }
        .rank-label { font-family: 'Playfair Display SC', serif; font-size: 20px; font-weight: bold; text-align: center; width: 80px; }
        .rank-s { color: #b8860b; text-shadow: 0 0 8px rgba(184, 134, 11, 0.4); }
        .rank-a { color: #8e5a31; }

        .timeline { position: relative; padding-left: 35px; border-left: 2px solid #d4c5a9; margin-left: 10px; }
        .event { position: relative; margin-bottom: 50px; }
        .event::before { content: ''; position: absolute; width: 16px; height: 16px; background: #8e5a31; border: 3px solid #f7f3e9; border-radius: 50%; left: -44px; top: 5px; }
        .event-date { font-weight: bold; color: #8e5a31; font-size: 18px; display: block; margin-bottom: 8px; font-family: 'Playfair Display SC', serif; }
        .event-title { font-weight: bold; font-size: 17px; color: #332a1b; display: block; margin-bottom: 12px; border-bottom: 1px solid rgba(142, 90, 49, 0.1); padding-bottom: 5px; }
        .event-content { font-size: 14.5px; line-height: 1.9; text-align: justify; color: #4a4238; }

        /* Glossary Grid */
        .glossary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .glossary-item { background: rgba(142, 122, 86, 0.05); padding: 25px; border: 1px solid rgba(212, 197, 169, 0.4); }
        .glossary-term { color: #8e5a31; font-weight: bold; font-size: 16px; display: block; margin-bottom: 10px; border-bottom: 1px dashed rgba(142, 90, 49, 0.3); padding-bottom: 5px; }
        .glossary-desc { font-size: 14px; line-height: 1.7; color: #5a5248; }

        /* Faction/School Styling */
        .faction-block { background: rgba(142, 122, 86, 0.03); border: 1px solid rgba(212, 197, 169, 0.8); padding: 40px; margin-bottom: 50px; border-radius: 2px; }

        .faction-detail { font-size: 15px; line-height: 2; color: #4a4238; text-align: justify; margin-bottom: 30px; background: rgba(255,255,255,0.3); padding: 20px; border-radius: 5px; }

        .dept-card { font-size: 14px; padding: 10px 15px; background: rgba(142, 90, 49, 0.08); border-left: 4px solid #8e5a31; color: #5e4d31; font-weight: bold; }

        footer { margin-top: 80px; text-align: center; font-size: 10px; color: #a39987; letter-spacing: 4px; padding-bottom: 20px; }
        .highlight { color: #8e5a31; font-weight: bold; }
    </style>
</head>

                name: "가이드라인 (Guide Line)", 
                desc: "지구 소속의 시스템, 성좌의 시선 아래에 놓인 헌터들이 소속된 파벌입니다. 성좌를 연구하고 시스템에 대하여 분석하며 헌터들의 전투, 탐사, 제작 능력을 발전시키기 위해서 가르치는 학파입니다. 현대적인 기술뿐만 아니라 성좌가 등장하면서 시스템에 의해서 발견된 마법, 신비 등에 대한 강의도 진행하고 있습니다. 주로 기초 체력이 일정치 않으며 이능에 익숙지 않은 헌터들을 위한 교육 과정이 있으며 필수로 들어야 하는 강의(기초체력단련, 기초적인 이능이론) 외에는 각각 다른 학과의 강의를 듣는 것으로 보입니다.",
                depts: ["현대오컬트학과", "천문관측학과", "육체단련학과", "이능공학과", "이계정보분석학과", "이능단련학과"]
            },
            { 
                name: "홍영 (紅英)", 
                desc: "도술, 선술, 주술, 음양술, 무공 등 주로 동양적인 기술을 다루는 학파로 굉장히 공격적인 성향이 강합니다. 연단, 야금과 같은 것을 다루는 학과가 있긴 하지만 그리 숫자가 많지 않습니다. 그 외에 다양한 종족의 학생들이 다니는 학파이다 보니 자신이 선천적으로 타고난 힘을 다루기 위한 학과 또한 존재합니다. 학파의 분위기는 배부른 맹수 특유의 나른함과 능구렁이와 같은 눈치와 말싸움 등이 자주 들리는 분위기입니다. 평소엔 순하지만 명분만 잡히면 다른 학과와 싸우는 경우가 많습니다.",
                depts: ["주술학과", "선술학과", "무술학과", "연단학과", "야금학과", "신비학과"]
            },
            { 
                name: "아스포델 (Asphodel)", 
                desc: "기록 분석 중... 서부의 신비와 사후 세계의 경계를 탐구하는 학파로 추정됩니다.",
                depts: ["상세 학과 준비 중", "상세 학과 준비 중"]
            }
        ];

        // [Execution Logic]
        function renderAll() {
            // Render Ranks
            const rankBody = document.getElementById('rank-body');
            rankData.forEach(r => {
                rankBody.innerHTML += `<tr><td class="rank-label ${r.style}">${r.label}</td><td class="${r.style}">${r.class}</td><td class="${r.style}">${r.def}</td></tr>`;
            });

            // Render History
            const timeline = document.getElementById('history-timeline');
            historyData.forEach(h => {
                timeline.innerHTML += `<div class="event"><span class="event-date">${h.date}</span><span class="event-title">${h.title}</span><p class="event-content">${h.content}</p></div>`;
            });

            // Render Glossary
            const glossaryGrid = document.getElementById('glossary-grid');
            glossaryData.forEach(g => {
                glossaryGrid.innerHTML += `<div class="glossary-item"><span class="glossary-term">${g.term}</span><p class="glossary-desc">${g.desc}</p></div>`;
            });

            // Render Factions
            const factionContent = document.getElementById('faction-content');
            factionData.forEach(f => {
                let deptHTML = f.depts.map(d => `<li class="dept-card">${d}</li>`).join('');
                factionContent.innerHTML += `
                    <div class="faction-block">
                        <span class="faction-header">${f.name}</span>
                        <p class="faction-detail">${f.desc}</p>
                        <ul class="dept-grid">${deptHTML}</ul>
                    </div>`;
            });
        }

        function enterAcademy() {
            document.getElementById('intro-overlay').classList.add('fade-out');
            document.body.classList.add('entered');
            showSection('home');
            renderAll();
        }

        function showSection(id) {
            document.querySelectorAll('main section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('nav a').forEach(a => a.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            const btn = document.getElementById('nav-' + id);
            if(btn) btn.classList.add('active');
        }
    </script>
</body>
</html>
