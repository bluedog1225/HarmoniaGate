<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>이계 탐사 전문 아카데미 : 하르모니아</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Great+Vibes&family=Playfair+Display+SC:wght@700&display=swap" rel="stylesheet">
    
    <style>
        /* [1. 전역 스타일 및 가독성] */
        :root {
            --font-main: 'Pretendard', sans-serif;
            --font-title: 'Black Han Sans', sans-serif;
            --point-color: #8e5a31;
            --color-guideline: #1e4a9e;
            --color-asphodel: #2d6a4f;
            --color-hongyeong: #a51c1c;
        }

        body { 
            font-family: var(--font-main); margin: 0; padding: 0; 
            background-color: #1a1714; color: #2d2924; overflow-x: hidden;
            background-image: linear-gradient(rgba(26, 23, 20, 0.94), rgba(26, 23, 20, 0.94)), 
                              url('https://images.unsplash.com/photo-1516979187457-637abb4f9353?auto=format&fit=crop&w=1920&q=80');
            background-size: cover; background-attachment: fixed;
            display: flex; justify-content: center; align-items: flex-start; min-height: 100vh;
            line-height: 1.8; word-break: keep-all;
        }

        /* [2. 인트로 오버레이 - 중앙 정렬 고정] */
        #intro-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #0c0b0a; z-index: 3000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: all 1.2s cubic-bezier(0.65, 0, 0.35, 1); cursor: pointer;
        }
        #intro-overlay.fade-out { opacity: 0; visibility: hidden; }

        .seal-button { display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .seal-button img { width: 130px; filter: sepia(0.3) brightness(0.9); animation: pulse 2.5s infinite; margin-bottom: 25px; }
        .seal-text { color:#8e7a56; letter-spacing: 10px; font-weight: bold; font-family: var(--font-title); margin: 0; }

        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.6; } 50% { transform: scale(1.03); opacity: 1; } }

        /* [3. 메인 컨테이너] */
        #container {
            width: 900px; margin: 60px 0; background-color: #fcfaf5; 
            border: 1px solid #c9ba9d; padding: 70px 60px; box-sizing: border-box; 
            box-shadow: 0 30px 80px rgba(0,0,0,0.8); position: relative;
            opacity: 0; transform: translateY(20px); transition: 1.5s ease-out;
        }
        body.entered #container { opacity: 1; transform: translateY(0); }

        header { text-align: center; border-bottom: 3px double #d4c5a9; padding-bottom: 45px; margin-bottom: 50px; }
        .main-logo { font-family: 'Great Vibes', cursive; font-size: 85px; margin: 0; color: #4a3b26; }
        .sub-title { font-size: 14px; letter-spacing: 12px; color: #7a664d; font-weight: 900; text-transform: uppercase; }

        nav { display: flex; justify-content: center; gap: 15px; margin-bottom: 60px; border-bottom: 2px solid rgba(142, 90, 49, 0.2); padding-bottom: 20px; }
        nav a { color: #8e7a56; text-decoration: none; font-size: 16px; font-weight: 900; cursor: pointer; transition: 0.3s; padding: 5px 12px; }
        nav a:hover, nav a.active { color: #1a1714; border-bottom: 4px solid var(--point-color); }

        /* [4. 섹션 스타일] */
        section { display: none; animation: fadeIn 0.8s forwards; }
        section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        h3, .event-title, .glossary-term, .block-header { font-family: var(--font-title); letter-spacing: 1px; }

        .info-block { background: rgba(142, 122, 86, 0.04); border: 1px solid #d4c5a9; padding: 45px; margin-bottom: 60px; border-top: 6px solid #ccc; border-radius: 4px; }
        .block-header { font-size: 34px; margin-bottom: 30px; text-align: center; border-bottom: 3px double #ccc; padding-bottom: 15px; }
        .block-detail { font-size: 17px; font-weight: 600; line-height: 2.1; text-align: justify; color: #332d26; }
        .block-detail p { margin-bottom: 20px; }

        /* 종족 정보 스타일 */
        .species-tag { display: inline-block; padding: 5px 12px; background: rgba(0,0,0,0.05); border-radius: 20px; margin-right: 8px; font-size: 14px; font-weight: 800; border: 1px solid rgba(0,0,0,0.1); }
        .species-label { font-family: var(--font-title); font-size: 18px; margin-top: 25px; margin-bottom: 10px; display: block; border-left: 5px solid #8e5a31; padding-left: 12px; }

        /* 학파별 테마 컬러 */
        .theme-guideline { border-top-color: var(--color-guideline) !important; }
        .theme-guideline .block-header { border-bottom-color: var(--color-guideline) !important; color: var(--color-guideline) !important; }
        .theme-guideline .dept-card { background-color: var(--color-guideline) !important; }
        .theme-guideline .species-label { border-left-color: var(--color-guideline) !important; color: var(--color-guideline); }

        .theme-asphodel { border-top-color: var(--color-asphodel) !important; }
        .theme-asphodel .block-header { border-bottom-color: var(--color-asphodel) !important; color: var(--color-asphodel) !important; }
        .theme-asphodel .dept-card { background-color: var(--color-asphodel) !important; }
        .theme-asphodel .species-label { border-left-color: var(--color-asphodel) !important; color: var(--color-asphodel); }

        .theme-hongyeong { border-top-color: var(--color-hongyeong) !important; }
        .theme-hongyeong .block-header { border-bottom-color: var(--color-hongyeong) !important; color: var(--color-hongyeong) !important; }
        .theme-hongyeong .dept-card { background-color: var(--color-hongyeong) !important; }
        .theme-hongyeong .species-label { border-left-color: var(--color-hongyeong) !important; color: var(--color-hongyeong); }

        /* [5. 기능적 요소: 툴팁/테이블/타임라인] */
        .dept-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; list-style: none; padding: 0; }
        .dept-card { font-size: 17px; padding: 18px; color: #fff; font-weight: 800; border-radius: 4px; text-align: center; cursor: help; position: relative; transition: 0.3s; }
        .tooltip { visibility: hidden; position: absolute; bottom: 115%; left: 50%; transform: translateX(-50%); width: 280px; background-color: #1a1714; color: #fff; padding: 18px; border-radius: 6px; z-index: 100; opacity: 0; transition: 0.3s; font-size: 15px; font-weight: 500; border: 1px solid #fff; pointer-events: none; }
        .dept-card:hover .tooltip { visibility: visible; opacity: 1; transform: translateX(-50%) translateY(-10px); }

        .rank-table { width: 100%; border-collapse: collapse; margin-top: 30px; font-weight: 600; }
        .rank-table td, .rank-table th { padding: 18px; border-bottom: 1px solid rgba(142, 90, 49, 0.2); }
        .rank-label { font-family: var(--font-title); font-size: 26px; text-align: center; width: 90px; color: #8e5a31; }
        .rank-s { color: #a67c00; text-shadow: 0 0 5px rgba(184, 134, 11, 0.2); }

        .timeline { position: relative; padding-left: 45px; border-left: 5px solid #d4c5a9; margin-left: 15px; }
        .event { position: relative; margin-bottom: 65px; }
        .event::before { content: ''; position: absolute; width: 22px; height: 22px; background: var(--point-color); border: 4px solid #fcfaf5; border-radius: 50%; left: -61.5px; top: 6px; z-index: 10; }
        .event-date { font-weight: 900; color: var(--point-color); font-size: 20px; display: block; margin-bottom: 10px; font-family: 'Playfair Display SC', serif; }
        .event-title { font-size: 24px; color: #1a1714; display: block; margin-bottom: 15px; }

        .glossary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; }
        .glossary-item { background: rgba(142, 122, 86, 0.08); padding: 30px; border: 1px solid rgba(212, 197, 169, 0.6); }
        .glossary-term { font-size: 20px; color: var(--point-color); margin-bottom: 12px; border-bottom: 2px solid rgba(142, 90, 49, 0.3); padding-bottom: 8px; }

        footer { margin-top: 100px; text-align: center; font-size: 13px; font-weight: 900; color: #8e7a56; letter-spacing: 5px; padding-bottom: 40px; }
        .highlight { color: var(--point-color); font-weight: 900; }
    </style>
</head>
<body onclick="if(!this.classList.contains('entered')) enterAcademy()">

    <div id="intro-overlay">
        <div class="seal-button">
            <img src="https://cdn-icons-png.flaticon.com/512/3522/3522192.png" alt="Seal">

    <div id="container">

        <nav>

            <a onclick="showSection('realms')" id="nav-realms">REALMS</a>
            <a onclick="showSection('academy')" id="nav-academy">ACADEMY</a>
            <a onclick="showSection('history')" id="nav-history">HISTORY</a>

            <a onclick="showSection('faction')" id="nav-faction">FACTION</a>

        <main id="main-content">
            <section id="home">
                <div style="text-align: center; padding: 50px 0;">
                    <p style="font-size: 28px; margin-bottom: 35px; font-family: var(--font-title); color: #2c2419;">하르모니아 아카데미 비밀 서고</p>
                    <p style="line-height: 2.8; font-size: 20px; font-weight: 600; color: #4a4238;">모든 학생과 교사 여러분은 이곳의 기록을 통해 <br> 차원의 경계를 이해하고 수호하는 법을 배우게 될 것입니다.</p>

    <script>
        // [Data: 16 Core History]
        const historyData = [
            { date: "2024. 12. 24", title: "첫 게이트 발생", content: "중국의 사천 지방에서 작은 게이트 발생, 방치되다가 공안에 의해 발견되어 연구를 시작하게 되었다." },
            { date: "2024. 12. 31", title: "첫 게이트 브레이크 - 이계화 발생", content: "방치되어 과부하가 시작된 게이트가 브레이크를 일으키며 사천 지방을 이계화(異界化) 시키기 시작하였다. 피난 온 이계인들과의 소통 실패로 1차 침식 대전이 발발하였다." },
            { date: "2025. 01. 04", title: "1차 침식 대전 - 중국의 몰락", content: "이능과 무공을 가진 이계인들의 반격에 현대 무기는 무력화되었다. 결국 어느 이계인이 가볍게 손짓하자 베이징에 운석이 박히면서 중국은 몰락의 길을 걷게 되었다." },
            { date: "2025. 01. 11", title: "시스템, 성좌 그리고 헌터의 등장", content: "민간인들이 기이한 존재 [성좌]의 선택을 받으며 헌터로서 등장했다. [시스템]의 선택을 받은 이들이 인류를 지탱하며 대등한 위치로 올라왔다." },
            { date: "2025. 01. 24", title: "'이계침식' 라비린토스", content: "수 많은 무기와 수많은 이들이 부딪히면서 차원들이 뒤섞여 급격한 침식을 일으켰고, 그들이 싸우던 중국 땅은 한 번에 터져 나가는 게이트 브레이크에 휘말렸다. 존재가 오염되어 인간도 이계인도 아닌 무언가로 변해버리는 재앙이 시작되었다." },
            { date: "2025. 01. 25", title: "1차 침식 대전 휴전 - '하르모니아 연맹' 결성", content: "공멸의 위기를 깨달은 양쪽 진영은 휴전을 선언하고, 뒤섞인 게이트들을 해결하기 위해 일시적으로 동맹을 맺으며 하르모니아 연맹이 탄생했다." },
            { date: "2025. 01. 27", title: "연맹 출전 - 완전한 공략 실패", content: "지하미궁 라비린토스에 스스로 발걸음을 옮겼으나 완전 공략은 불가능했다. 하지만 봉인 술식을 통해 침식을 중국 지하로 한정하는 데 성공했다." },
            { date: "2025. 02. 04", title: "종전 및 하르모니아 조약", content: "관리를 위해 인류와 이계인이 손을 맞잡았다. 서로가 공존하기 위해 협력할 것을 약속하며 '하르모니아 조약'이 체결되었다." },
            { date: "2025. 02. 15", title: "이계인들의 거주지구 결정", content: "이계인들의 제안을 받아 그들의 거주지구를 한 때 중국이었던 토지로 결정하였고, 그들은 라비린토스 영향이 가장 적은 곳에 거점을 만들며 정착하게 되었다." },
            { date: "2025. 02. 18", title: "학원도시 하르모니아 공사 시작", content: "제2의 재앙을 대비하여 공중섬 형태의 학원도시 개발 및 공사를 시작했다." },
            { date: "2034. 12. 24", title: "학원도시 하르모니아 개방", content: "중국 상공에 완공된 거대 학원도시 개방. 헌터들과 이계인들이 머물며 성장하고 라비린토스를 조사하는 거점이 되었다." },
            { date: "2035. 01. 01", title: "탑승기 '아리아드네' 완성", content: "라비린토스 내부에 안전하게 진입하기 위한 전용 탑승기 '아리아드네'가 완성되었다." },
            { date: "2037. 01. 05", title: "관측기 '아르고스' 완성", content: "균열을 빠르게 포착할 수 있는 관측기 '아르고스'가 구축되었다." },
            { date: "2077. 07. 07", title: "하르모니아 테러 발생", content: "순수주의자 집단 '퓨어 휴먼'과 이계인 집단 '무지'의 테러 시도가 있었으나 이사장에 의해 제압 및 처형당했다." },
            { date: "2083. 05. 04", title: "2차 테러 및 아르고스 탈취 시도", content: "'무지'의 테러와 탈취 위기가 있었으나 이번에도 이사장의 도움으로 방어에 성공했다." },
            { date: "2127. 04. 01", title: "NOW : 현재", content: "하르모니아 아카데미는 인류 최전방에서 여전히 차원의 경계를 지키고 있습니다." }
        ];

        // [Data: Realms - 종족 정보 추가]
        const realmsData = [
            {
                name: "Earth (지구)", theme: "theme-guideline",
                species: ["인간", "침식자"],
                content: `<p>원래의 인류가 살아가던 터전. 2024년 게이트 발생 이후 100년 이상이 지난 미래, 발달된 기술과 [성좌] [시스템] 등 초월적인 존재의 가호를 받으면서 생존을 위해서 발버둥 치는 이들의 세계입니다. 오컬트와 발달한 기술 그리고 신화와 전설의 이야기가 공존하면서 살아가는 세계입니다.</p>`
            },
            {
                name: "Asphodel (아스포델)", theme: "theme-asphodel",
                species: ["인간", "엘프", "드워프", "수인 등"],
                content: `
                    <p>푸른색의 아스포델. 19세기 서구권과 유사한 삶과 죽음이 뒤섞여있는 회색의 세계입니다. 이 세계에서 죽음이란 제한 시간이 생기는 것과 같습니다. 죽어도 죽지 않으며 혼으로서 망자로서 그저 변화할 뿐 존재가 여전히 유지되기 때문입니다.</p>
                    <p>죽음이 없는 터라 제압이나 무력화에 중심을 둔 의학의 발달이 더디고, 장례 문화와 그것을 기반으로 한 주술이 크게 발달하였습니다. 주술이나 무술 또한 살상보다는 무력화와 제압, 고문에 가까운 형태를 지닙니다.</p>
                    <p>그러나 삶의 영역에서 죽음의 영역으로 넘어간 이들은 시간이 지날수록 혼이 흐트러지고 결국 움직임 없는 '무아(無我)'로 돌아가게 됩니다. 무아에서 도망치기 위해 타인의 혼을 탐하는 자들로 인해 혼란이 끊이지 않으며, 장의사들은 종교의 가르침으로 이들을 제압하고 강제로 무아로 되돌리는 역할을 수행합니다.</p>`
            },
            {
                name: "Hong-Yeong (홍영/紅英)", theme: "theme-hongyeong",
                species: ["인간", "요괴", "영물 등"],
                content: `
                    <p>도술, 주술, 무공, 선술, 요술이 공존하는 세계. 조화를 이루며 평화롭게 사는 듯 보이나 실상은 서로를 물어뜯고 할퀴는 붉은빛의 **수라도(修羅道)**입니다.</p>
                    <p>황실, 무림, 선산이라는 3개 거대 세력이 오악(五岳)의 영토를 두고 날을 세우고 있으며, 450년 전 무림의 '천마'가 황제의 목을 딴 사건 이후 세력 간의 혐오는 극에 달해 있습니다. 근본적으로 투쟁을 갈구하는 수라의 본능이 잠들어 있는 세계입니다.</p>`
            }
        ];

        const rankData = [
            { label: "S", class: "초월자", def: "자신만의 별을 찾고 자신만의 질서를 세운 자.", style: "rank-s" },
            { label: "A", class: "초월자의 씨앗", def: "별을 향해 손을 뻗는 자.", style: "" },

        function renderAll() {
            const realmsContent = document.getElementById('realms-content');
            realmsData.forEach(r => {
                let speciesHTML = r.species.map(s => `<span class="species-tag">${s}</span>`).join('');
                realmsContent.innerHTML += `
                    <div class="info-block ${r.theme}">
                        <span class="block-header">${r.name}</span>
                        <div class="block-detail">${r.content}</div>
                        <span class="species-label">Core Species</span>
                        <div>${speciesHTML}</div>
                    </div>`;
            });

            const rankBody = document.getElementById('rank-body');
            rankData.forEach(r => { rankBody.innerHTML += `<tr><td class="rank-label ${r.style}">${r.label}</td><td class="${r.style}">${r.class}</td><td class="${r.style}">${r.def}</td></tr>`; });

            const timeline = document.getElementById('history-timeline');
            historyData.forEach(h => { timeline.innerHTML += `<div class="event"><span class="event-date">${h.date}</span><span class="event-title">${h.title}</span><p class="event-content">${h.content}</p></div>`; });

            const glossaryGrid = document.getElementById('glossary-grid');
            glossaryData.forEach(g => { glossaryGrid.innerHTML += `<div class="glossary-item"><span class="glossary-term">${g.term}</span><p class="glossary-desc">${g.desc}</p></div>`; });

            const factionContent = document.getElementById('faction-content');
            factionData.forEach(f => {
                let deptHTML = f.depts.map(d => `<li class="dept-card">${d}<div class="tooltip">${tooltipInfo[d] || "상세 정보를 준비 중입니다."}</div></li>`).join('');
                factionContent.innerHTML += `<div class="info-block ${f.theme}"><span class="block-header">${f.name}</span><p class="block-detail" style="font-size:16px;">${f.desc}</p><ul class="dept-grid">${deptHTML}</ul></div>`;
            });
        }

        function enterAcademy() { document.getElementById('intro-overlay').classList.add('fade-out'); document.body.classList.add('entered'); showSection('home'); renderAll(); }
        function showSection(id) { document.querySelectorAll('main section').forEach(s => s.classList.remove('active')); document.querySelectorAll('nav a').forEach(a => a.classList.remove('active')); document.getElementById(id).classList.add('active'); const btn = document.getElementById('nav-' + id); if(btn) btn.classList.add('active'); }
