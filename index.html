<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>이계 탐사 전문 아카데미 : 하르모니아</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Great+Vibes&family=Playfair+Display+SC:wght@700&display=swap" rel="stylesheet">
    
    <style>
        /* 1. 기본 레이아웃 및 폰트 설정 */
        :root {
            --font-main: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            --font-title: 'Black Han Sans', sans-serif;
        }

        body { 
            font-family: var(--font-main);
            margin: 0; padding: 0; 
            background-color: #1a1714; color: #2d2924; overflow-x: hidden;
            background-image: linear-gradient(rgba(26, 23, 20, 0.93), rgba(26, 23, 20, 0.93)), 
                              url('https://images.unsplash.com/photo-1516979187457-637abb4f9353?auto=format&fit=crop&w=1920&q=80');
            background-size: cover; background-attachment: fixed;
            display: flex; justify-content: center; align-items: flex-start; min-height: 100vh;
            line-height: 1.8;
            word-break: keep-all; /* 단어 단위 줄바꿈으로 가독성 향상 */
        }

        /* 2. 인트로 오버레이 */
        #intro-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #0c0b0a; z-index: 2000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: all 1.2s cubic-bezier(0.65, 0, 0.35, 1); cursor: pointer;
        }
        #intro-overlay.fade-out { opacity: 0; visibility: hidden; }
        .seal-button img { width: 130px; filter: sepia(0.3) brightness(0.9); animation: pulse 2.5s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.6; } 50% { transform: scale(1.03); opacity: 1; } }

        /* 3. 메인 컨테이너 */
        #container {
            width: 900px; margin: 60px 0; background-color: #fcfaf5; 
            border: 1px solid #c9ba9d; padding: 70px 60px; box-sizing: border-box; 
            box-shadow: 0 25px 70px rgba(0,0,0,0.7); position: relative;
            opacity: 0; transform: translateY(20px); transition: 1.5s ease-out;
        }
        body.entered #container { opacity: 1; transform: translateY(0); }

        /* 4. 헤더 및 네비게이션 */
        header { text-align: center; border-bottom: 3px double #d4c5a9; padding-bottom: 45px; margin-bottom: 50px; }
        .main-logo { font-family: 'Great Vibes', cursive; font-size: 85px; margin: 0; color: #4a3b26; }
        .sub-title { font-size: 13px; letter-spacing: 12px; color: #7a664d; font-weight: 800; text-transform: uppercase; }

        nav { display: flex; justify-content: center; gap: 30px; margin-bottom: 60px; border-bottom: 1px solid rgba(142, 90, 49, 0.2); padding-bottom: 20px; }
        nav a { color: #8e7a56; text-decoration: none; font-size: 16px; font-weight: 800; cursor: pointer; transition: 0.3s; padding: 5px 15px; }
        nav a:hover, nav a.active { color: #1a1714; border-bottom: 3px solid #8e5a31; }

        /* 5. 섹션별 스타일 (폰트 두께 및 크기 조정) */
        section { display: none; animation: fadeIn 0.8s forwards; }
        section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Titles */
        h3, .event-title, .glossary-term, .faction-header {
            font-family: var(--font-title);
            letter-spacing: 1px;
        }

        /* Explorer Ranks */
        .rank-table { width: 100%; border-collapse: collapse; margin-top: 30px; }
        .rank-table th, .rank-table td { padding: 18px; border-bottom: 1px solid rgba(142, 90, 49, 0.2); text-align: left; font-size: 16px; }
        .rank-label { font-family: var(--font-title); font-size: 24px; text-align: center; width: 90px; }
        .rank-s { color: #a67c00; text-shadow: 0 0 5px rgba(184, 134, 11, 0.2); }

        /* History Timeline */
        .timeline { position: relative; padding-left: 45px; border-left: 4px solid #d4c5a9; margin-left: 15px; }
        .event { position: relative; margin-bottom: 65px; }
        .event::before { content: ''; position: absolute; width: 20px; height: 20px; background: #8e5a31; border: 4px solid #fcfaf5; border-radius: 50%; left: -59px; top: 6px; z-index: 10; }
        .event-date { font-weight: 800; color: #8e5a31; font-size: 20px; display: block; margin-bottom: 10px; font-family: 'Playfair Display SC', serif; }
        .event-title { font-size: 22px; color: #1a1714; display: block; margin-bottom: 15px; }
        .event-content { font-size: 17px; line-height: 2.1; font-weight: 500; }

        /* Glossary Grid */
        .glossary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; }
        .glossary-item { background: rgba(142, 122, 86, 0.06); padding: 30px; border: 1px solid rgba(212, 197, 169, 0.6); }
        .glossary-term { font-size: 19px; color: #8e5a31; margin-bottom: 12px; border-bottom: 2px solid rgba(142, 90, 49, 0.2); padding-bottom: 8px; }
        .glossary-desc { font-size: 16px; font-weight: 500; }

        /* Faction Styling */
        .faction-block { background: rgba(142, 122, 86, 0.03); border: 1px solid rgba(212, 197, 169, 0.8); padding: 45px; margin-bottom: 60px; }
        .faction-header { font-size: 32px; color: #2d2419; margin-bottom: 30px; text-align: center; border-bottom: 3px double #8e5a31; padding-bottom: 15px; }
        .faction-detail { font-size: 17px; font-weight: 500; line-height: 2.2; margin-bottom: 35px; }
        .dept-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; list-style: none; padding: 0; }
        .dept-card { font-size: 16px; padding: 15px 20px; background: #8e5a31; color: #fff; font-weight: 700; border-radius: 2px; text-align: center; }

        footer { margin-top: 100px; text-align: center; font-size: 12px; font-weight: 800; color: #8e7a56; letter-spacing: 5px; padding-bottom: 40px; }
        .highlight { color: #8e5a31; font-weight: 800; }
    </style>
</head>

            { 
                name: "홍영 (紅英)", 
                desc: "도술, 선술, 주술, 무공 등 동양적 기술을 다루는 공격적 학파. 나른한 맹수와 같은 분위기 속에 예리한 통찰을 숨기고 있으며, 명분이 서면 그 어느 곳보다 격렬하게 충돌하는 정체성을 지닙니다.",
                depts: ["주술학과", "선술학과", "무술학과", "연단학과", "야금학과", "신비학과"]
            },
            { name: "아스포델 (Asphodel)", desc: "기록 분석 중...", depts: ["상세 학과 준비 중"] }
        ];

        function renderAll() {
            const rankBody = document.getElementById('rank-body');
            rankData.forEach(r => { rankBody.innerHTML += `<tr><td class="rank-label ${r.style}">${r.label}</td><td class="${r.style}">${r.class}</td><td class="${r.style}">${r.def}</td></tr>`; });

            const timeline = document.getElementById('history-timeline');
            historyData.forEach(h => { timeline.innerHTML += `<div class="event"><span class="event-date">${h.date}</span><span class="event-title">${h.title}</span><p class="event-content">${h.content}</p></div>`; });

            const glossaryGrid = document.getElementById('glossary-grid');
            glossaryData.forEach(g => { glossaryGrid.innerHTML += `<div class="glossary-item"><span class="glossary-term">${g.term}</span><p class="glossary-desc">${g.desc}</p></div>`; });

            const factionContent = document.getElementById('faction-content');
            factionData.forEach(f => {
                let deptHTML = f.depts.map(d => `<li class="dept-card">${d}</li>`).join('');
                factionContent.innerHTML += `<div class="faction-block"><span class="faction-header">${f.name}</span><p class="faction-detail">${f.desc}</p><ul class="dept-grid">${deptHTML}</ul></div>`;
            });
        }

        function enterAcademy() {
            document.getElementById('intro-overlay').classList.add('fade-out');
            document.body.classList.add('entered');
            showSection('home');
            renderAll();
        }

        function showSection(id) {
            document.querySelectorAll('main section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('nav a').forEach(a => a.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            const btn = document.getElementById('nav-' + id);
            if(btn) btn.classList.add('active');
        }
    </script>
</body>
</html>
