<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>이계 탐사 전문 아카데미 : 하르모니아</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display+SC:wght@700&family=Nanum+Myeongjo:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        /* 1. 기본 배경 및 변수 */
        body { 
            font-family: 'Nanum Myeongjo', serif; margin: 0; padding: 0; 
            background-color: #241f1c; 
            background-image: linear-gradient(rgba(36, 31, 28, 0.85), rgba(36, 31, 28, 0.85)), url('https://images.unsplash.com/photo-1516979187457-637abb4f9353?auto=format&fit=crop&w=1920&q=80');
            background-size: cover; background-attachment: fixed;
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
            overflow: hidden; /* 인트로 전에는 스크롤 방지 */
        }

        /* 2. 인트로 화면 (입장 전) */
        #intro-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #100e0c;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 1000; transition: all 1.5s cubic-bezier(0.65, 0, 0.35, 1);
        }

        #intro-overlay.fade-out {
            opacity: 0; visibility: hidden; transform: scale(1.1);
        }

        .seal-button {
            cursor: pointer; text-align: center; transition: 0.5s;
        }

        .seal-button img {
            width: 120px; filter: sepia(1) brightness(0.8);
            margin-bottom: 20px; animation: pulse 2s infinite;
        }

        .seal-button p {
            color: #8e7a56; letter-spacing: 5px; font-size: 13px; font-weight: bold;
            text-shadow: 0 0 10px rgba(142, 122, 86, 0.5);
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.7; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(1); opacity: 0.7; }
        }

        /* 3. 메인 컨테이너 (기존 스타일 유지) */
        #container {
            width: 750px; min-height: 650px; 
            background-color: #f7f3e9; 
            background-image: url('https://www.transparenttextures.com/patterns/paper-fibers.png');
            border: 1px solid #d4c5a9; 
            padding: 70px 60px; box-sizing: border-box; 
            box-shadow: 0 15px 50px rgba(0,0,0,0.4); 
            position: relative; opacity: 0; transform: translateY(20px);
            transition: 1.5s ease-out;
        }

        /* 입장이 완료되면 메인 컨테이너 등장 */
        body.entered #container { opacity: 1; transform: translateY(0); }

        /* --- 이하 기존 디자인 스타일과 동일 --- */
        header { text-align: center; border-bottom: 2px double #d4c5a9; padding-bottom: 30px; margin-bottom: 35px; }
        h1.main-logo { font-family: 'Great Vibes', cursive; font-size: 75px; margin: 0; color: #5e4d31; cursor: pointer; }
        p.sub-title { font-size: 12px; letter-spacing: 7px; color: #8e7a56; margin-top: 5px; font-weight: bold; }
        nav { display: flex; justify-content: center; gap: 40px; margin-bottom: 50px; }
        nav a { color: #a18e6a; text-decoration: none; font-size: 13px; letter-spacing: 2px; font-weight: bold; cursor: pointer; transition: 0.3s; padding-bottom: 5px; }
        nav a:hover, nav a.active { color: #332a1b; border-bottom: 2px solid #8e5a31; }
        main section { display: none; text-align: center; line-height: 2.5; color: #4a4238; transform-origin: left center; }
        main section.active { display: block; animation: flipIn 0.8s forwards; }
        @keyframes flipIn { from { opacity: 0; transform: rotateY(-15deg) translateX(50px); } to { opacity: 1; transform: rotateY(0deg) translateX(0); } }
        .highlight { color: #8e5a31; font-weight: bold; border-bottom: 1px solid rgba(142, 90, 49, 0.2); }
        .deco-line { width: 40px; height: 1px; background: #d4c5a9; margin: 20px auto; }
        footer { margin-top: 60px; text-align: center; font-size: 10px; color: #a39987; letter-spacing: 3px; border-top: 1px solid rgba(0,0,0,0.05); padding-top: 20px; }
    </style>
</head>
<body>

    <div id="intro-overlay">
        <div class="seal-button" onclick="enterAcademy()">
            <img src="https://cdn-icons-png.flaticon.com/512/3522/3522192.png" alt="Seal">
            <p>CLICK TO ENTER HARMONIA</p>
        </div>
    </div>

    <div id="container">
        <header>
            <h1 class="main-logo" onclick="showSection('home')">Harmonia</h1>
            <p class="sub-title">이계 탐사 전문 아카데미</p>
        </header>

        <nav>
            <a onclick="showSection('home')" class="active">HOME</a>
            <a onclick="showSection('history')">HISTORY</a>
            <a onclick="showSection('faction')">FACTION</a>
            <a onclick="showSection('school')">SCHOOL</a>
            <a onclick="showSection('academy')">ACADEMY</a>
        </nav>

        <main>
            <section id="home" class="active">
                <div class="deco-line"></div>
                <p>이계 탐사 전문 아카데미 <span class="highlight">하르모니아</span>의 서고에 접속하셨습니다.</p>
                <p>모든 기록은 기밀사항이며, 허가된 학생만이 열람할 수 있습니다.</p>
            </section>
            
            <section id="history">
                <h2 style="font-family: 'Playfair Display SC', serif;">History</h2>
                <div class="deco-line"></div>
                <p>1924년 첫 게이트 발견 이후의 기록들...</p>
            </section>
        </main>
        
        <footer>© HARMONIA ACADEMY. ALL RIGHTS RESERVED.</footer>
    </div>

    <script>
        // 입장을 위한 함수
        function enterAcademy() {
            const overlay = document.getElementById('intro-overlay');
            overlay.classList.add('fade-out'); // 인트로 사라짐
            document.body.classList.add('entered'); // 메인 컨텐츠 등장
        }

        // 섹션 전환 함수
        function showSection(sectionId) {
            const sections = document.querySelectorAll('main section');
            sections.forEach(sec => sec.classList.remove('active'));

            const links = document.querySelectorAll('nav a');
            links.forEach(link => link.classList.remove('active'));

            document.getElementById(sectionId).classList.add('active');
            
            const activeLink = Array.from(links).find(link => link.innerText.toLowerCase() === sectionId.toLowerCase());
            if (activeLink) activeLink.classList.add('active');
            else if (sectionId === 'home') links[0].classList.add('active');
        }
    </script>
</body>
</html>
