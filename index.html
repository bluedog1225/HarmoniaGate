<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>하르모니아 아카데미 : 통합 기밀 보관소</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Great+Vibes&family=Playfair+Display+SC:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --font-main: 'Pretendard', sans-serif;
            --font-title: 'Black Han Sans', sans-serif;
            --point-color: #8e5a31;
            --color-guideline: #1a3a7a; --color-asphodel: #1b4332; --color-hongyeong: #7f1d1d;
            --glass-bg: rgba(255, 252, 245, 0.96);
        }

        /* [1. 배경 엔진] */
        body { font-family: var(--font-main); margin: 0; padding: 0; background-color: #050505; color: #1a1714; overflow-x: hidden; line-height: 1.9; word-break: keep-all; }
        #parallax-bg { position: fixed; top: -5%; left: -5%; width: 110%; height: 110%; background-image: linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.75)), url('https://images.unsplash.com/photo-1516979187457-637abb4f9353?auto=format&fit=crop&w=1920&q=80'); background-size: cover; background-position: center; z-index: -3; will-change: transform; }
        #mist-wrapper { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; overflow: hidden; pointer-events: none; }
        .mist-layer { position: absolute; width: 200%; height: 100%; background: url('https://raw.githubusercontent.com/thefubuki/css-clouds/master/clouds.png'); background-size: contain; opacity: 0.15; animation: drift linear infinite; }
        .mist-1 { bottom: 0; animation-duration: 75s; }
        .mist-2 { bottom: -10%; animation-duration: 120s; animation-direction: reverse; opacity: 0.1; }
        .mist-3 { top: -20%; animation-duration: 160s; opacity: 0.05; }
        @keyframes drift { from { transform: translateX(0); } to { transform: translateX(-50%); } }

        /* [2. 인트로 및 컨테이너] */
        #intro-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: #0c0b0a; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: 1.2s ease; cursor: pointer; }
        #intro-overlay.fade-out { opacity: 0; visibility: hidden; pointer-events: none; }
        #container { width: 1050px; margin: 60px auto; background: var(--glass-bg); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.2); padding: 80px; box-sizing: border-box; border-radius: 4px; box-shadow: 0 50px 150px rgba(0,0,0,0.9); position: relative; opacity: 0; transform: translateY(30px); transition: 1.2s ease-out; z-index: 10; }
        body.entered #container { opacity: 1; transform: translateY(0); }

        header { text-align: center; border-bottom: 2px solid rgba(142, 90, 49, 0.2); padding-bottom: 50px; margin-bottom: 50px; }
        .main-logo { font-family: 'Great Vibes', cursive; font-size: 100px; margin: 0; color: #2d1f15; }
        .sub-title { font-size: 14px; letter-spacing: 12px; color: #8e7a56; font-weight: 900; text-transform: uppercase; margin-top: -15px; }

        nav { display: flex; justify-content: center; gap: 5px; margin-bottom: 60px; }
        nav a { color: #8e7a56; text-decoration: none; font-size: 17px; font-weight: 900; cursor: pointer; transition: 0.3s; padding: 10px 20px; }
        nav a:hover, nav a.active { color: #1a1714; border-bottom: 3px solid var(--point-color); }

        section { display: none; animation: fadeIn 0.6s forwards; }
        section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* [3. 폴더 및 인터랙티브 UI] */
        .doc-folder { background: #fff; border: 1px solid #ddd; margin-bottom: 25px; border-radius: 4px; overflow: hidden; transition: 0.3s; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .doc-folder-header { padding: 25px 35px; background: #f8f8f8; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-family: var(--font-title); font-size: 24px; border-bottom: 1px solid #eee; }
        .doc-folder-header:hover { background: #f0f0f0; }
        .doc-content { max-height: 0; overflow: hidden; transition: max-height 0.6s ease-out; background: #fff; font-size: 18.5px; font-weight: 600; line-height: 2.2; text-align: justify; padding: 0 45px; }
        .doc-folder.active .doc-content { max-height: 5000px; padding: 45px; }
        .doc-folder.active { box-shadow: 0 15px 45px rgba(0,0,0,0.1); border-color: var(--point-color); }

        .glossary-item { border-bottom: 1px solid #eee; }
        .glossary-trigger { padding: 22px 0; cursor: pointer; font-family: var(--font-title); font-size: 20px; color: var(--point-color); display: flex; align-items: center; gap: 15px; }
        .glossary-body { max-height: 0; overflow: hidden; transition: 0.4s ease; padding-left: 35px; font-size: 17.5px; color: #333; font-weight: 500; }
        .glossary-item.open .glossary-body { max-height: 500px; padding-bottom: 25px; }

        .dept-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; list-style: none; padding: 0; margin-top: 35px; }
        .dept-card { padding: 24px; color: #fff !important; font-weight: 900; font-size: 19.5px; border-radius: 4px; text-align: center; cursor: help; position: relative; transition: 0.3s; text-shadow: 1px 1px 3px rgba(0,0,0,0.4); box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .dept-card:hover { transform: translateY(-4px); filter: brightness(1.15); }

        .theme-guideline { border-left: 10px solid var(--color-guideline); } .theme-guideline .dept-card { background: var(--color-guideline); }
        .theme-asphodel { border-left: 10px solid var(--color-asphodel); } .theme-asphodel .dept-card { background: var(--color-asphodel); }
        .theme-hongyeong { border-left: 10px solid var(--color-hongyeong); } .theme-hongyeong .dept-card { background: var(--color-hongyeong); }

        .timeline { padding-left: 60px; border-left: 5px solid var(--point-color); margin-top: 40px; }
        .event { position: relative; margin-bottom: 90px; }
        .event::before { content: ''; position: absolute; width: 22px; height: 22px; background: var(--point-color); border: 5px solid #fff; border-radius: 50%; left: -78.5px; top: 10px; box-shadow: 0 0 15px rgba(142, 90, 49, 0.4); }
        .event-date { font-weight: 900; color: var(--point-color); font-size: 22px; display: block; font-family: 'Playfair Display SC', serif; }
        .event-title { font-size: 26px; color: #1a1714; font-family: var(--font-title); display: block; margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        
        .rank-table { width: 100%; border-collapse: collapse; margin-top: 30px; background: #fff; }
        .rank-table td { padding: 25px; border-bottom: 1px solid #eee; }
        .rank-label { font-family: var(--font-title); font-size: 32px; text-align: center; color: var(--point-color); width: 85px; }
        .tooltip { visibility: hidden; position: absolute; bottom: 125%; left: 50%; transform: translateX(-50%); width: 320px; background: #0c0b0a; color: #fff; padding: 22px; border-radius: 8px; z-index: 1000; opacity: 0; transition: 0.3s; font-size: 15px; border: 1px solid var(--point-color); }
        .dept-card:hover .tooltip { visibility: visible; opacity: 1; transform: translateX(-50%) translateY(-10px); }
        footer { margin-top: 150px; text-align: center; font-size: 15px; font-weight: 900; color: #8e7a56; letter-spacing: 10px; padding-bottom: 80px; opacity: 0.5; }
    </style>
</head>
<body onclick="if(!this.classList.contains('entered')) enterAcademy()">

    <div id="parallax-bg"></div>
    <div id="mist-wrapper">
        <div class="mist-layer mist-1"></div>
        <div class="mist-layer mist-2"></div>
        <div class="mist-layer mist-3"></div>
    </div>

    <div id="intro-overlay" onclick="enterAcademy()">
        <div style="text-align:center;">
            <svg width="150" height="150" viewBox="0 0 100 100" fill="none"><circle cx="50" cy="50" r="45" stroke="#8e7a56" stroke-width="1.5"/><rect x="30" y="47" width="40" height="6" fill="#8e7a56"/></svg>
            <p style="color:#8e7a56; letter-spacing: 12px; margin-top: 30px; font-weight: bold; font-family: var(--font-title);">ACCESS SYSTEM</p>
            <p style="color:#444; font-size:12px; margin-top:10px;">[ 화면을 클릭하여 입장하십시오 ]</p>
        </div>
    </div>

    <div id="container">
        <header><h1 class="main-logo">Harmonia</h1><p class="sub-title">Integrated Academy Database</p></header>
        <nav>
            <a onclick="showSection('home')" id="nav-home">HOME</a>
            <a onclick="showSection('realms')" id="nav-realms">REALMS</a>
            <a onclick="showSection('academy')" id="nav-academy">ACADEMY</a>
            <a onclick="showSection('history')" id="nav-history">HISTORY</a>
            <a onclick="showSection('glossary')" id="nav-glossary">GLOSSARY</a>
            <a onclick="showSection('faction')" id="nav-faction">FACTION</a>
        </nav>

        <main id="main-content">
            <section id="home">
                <div style="text-align: center; padding: 60px 0;">
                    <h2 style="font-family: var(--font-title); font-size: 40px; margin-bottom: 40px;">하르모니아 아카데미 비밀 서고</h2>
                    <div style="background: rgba(255,255,255,0.4); padding: 50px; border-radius: 4px; display: inline-block; min-width: 600px; border: 1px solid rgba(142, 90, 49, 0.1);">
                        <p style="line-height: 3.5; font-size: 24px; font-weight: 600; color: #2d1f15;">
                            모든 학생과 교사 여러분은 <br> 
                            이곳의 기록을 통해 <br> 
                            차원의 경계를 이해하고 수호하는 법을 배우게 될 것입니다.
                        </p>
                    </div>
                </div>
            </section>
            <section id="realms"><div id="realms-content"></div></section>
            <section id="academy">
                <div id="academy-content"></div>
                <h3 style="text-align:center; font-size: 35px; margin: 100px 0 50px;">Explorer Rank System</h3>
                <table class="rank-table"><tbody id="rank-body"></tbody></table>
            </section>
            <section id="history"><div id="history-timeline" class="timeline"></div></section>
            <section id="glossary"><div id="glossary-grid" class="glossary-grid"></div></section>
            <section id="faction"><div id="faction-content"></div></section>
        </main>
        <footer>© HARMONIA ACADEMY. ALL RIGHTS RESERVED.</footer>
    </div>

    <script>
        // [Data Zone: 원문 보존 & 존댓말 수정]
        const realmsData = [
            { name: "🌏 Earth (지구)", theme: "theme-guideline", content: "원래의 인류가 살아가던 터전입니다. 2024년 게이트 발생 이후 [시스템]과 [성좌]라는 초월적 간섭이 일상화된 세계입니다. 현대 과학과 신비가 공존하고 있으며, 성좌의 권능을 필터링하여 사용하는 헌터들이 인류의 새로운 방패로 서 있습니다." },
            { name: "🌑 Asphodel (아스포델)", theme: "theme-asphodel", content: "푸른색의 아스포델입니다. 19세기 서구권과 유사한 삶과 죽음이 뒤섞여 있는 회색의 세계입니다. 이 세계에서 죽음이란 존재의 소멸이 아닌, '제한 시간'이 생기는 것과 같습니다. 죽어도 죽지 않으며 혼으로서, 망자로서 그저 변화할 뿐 존재가 여전히 유지되기 때문입니다. 죽음이 없는 터라 제압이나 무력화에 중심을 둔 의학의 발달이 더디고, 장례 문화와 그것을 기반으로 한 주술이 크게 발달하였습니다. 주술이나 무술 또한 살상보다는 무력화와 제압, 고문에 가까운 형태를 지니고 있습니다. 그러나 죽음이 없더라도 언제나 끝은 존재하는 법이기에, 삶의 영역에서 죽음의 영역으로 넘어간 이들은 시간이 지날수록 그 혼이 흐트러지고 그 혼에 따라 넋 또한 흐려지니 결국에는 움직임이 없는 무아로 돌아가게 됩니다. 무아에서 도망칠 방법은 끊임없이 타인의 혼과 넋을 자신의 것으로 삼는 것으로, 이 탓에 아스포델에서는 혼란이 끊이지 않습니다. 이러한 상황들이 겹쳐서 생긴 것이 장의사이며, 이들은 종교의 가르침으로 주술과 무예를 익혀 타락하여 타인의 혼을 탐하는 이들을 제압하고 강제로 무아로 되돌리는 역할을 수행합니다. 아스포델에 있는 종교는 문화나 지역에 따라 그 율법이나 교리, 부르는 신의 이름 또한 차이를 보이지만 그 근본은 단일 종교이며, 무아가 된 이들을 받아주는 '끝의 신'을 모시고 있습니다." },
            { name: "⚔️ Hong-Yeong (홍영)", theme: "theme-hongyeong", content: "도술, 주술, 무공, 선술, 요술이 공존하는 세계입니다. 다양한 생명체들이 조화를 이루며 평화롭게 살아가는 듯 보이지만, 실상은 서로를 물어뜯고 할퀴며 피와 같은 붉은빛이 사라지지 않는 수라도(修羅道)를 연상시키는 세계입니다. 황실, 무림, 선산이라는 총 3개의 거대한 세력이 존재하며, 서로 명분과 기회만 충분하다면 공격할 생각이 가득한 것으로 보입니다. 홍영의 오악(五岳) 중 태산, 항산, 숭산은 선산이 차지하고 있었고, 나머지 화산은 무림이, 형산은 황실이 차지한 것으로 보입니다. 그것조차 선산에서는 자신들이 닿았어야 할 땅이라며 싫어하는 기색을 보이고 있습니다. 다양한 종족이 살고 있다 보니 요괴나 영물 같은 생물들이 존재하지만, 저 3개의 세력을 껄끄러워하는 편이기에 최대한 피해 다니는 것으로 보입니다. 황실은 450년 전 무림에 나타난 천마가 당시 황제였던 홍덕제의 목을 베었기에 무림을 싫어하고, 선산은 450년 전 천마가 선산을 모독하는 행위를 하였기에 그를 혐오합니다. 무림과 선산은 황실이 틈만 나면 통제를 하려 들기에 싫어하며 날을 세우고 있고, 황실은 선산이나 무림 모두 세속적이고 통제를 따르지 않고 날뛰며 문제를 일으키기에 싫어합니다. 하지만 근본적으로 그들의 피에는 끝없는 투쟁을 갈구하는 수라의 본능이 잠들어 있기에 더욱더 날을 세우는 것일지도 모릅니다." }
        ];

            { name: "Guide Line (가이드라인)", theme: "theme-guideline", desc: "지구 소속의 시스템과 성좌의 시선 아래에 놓인 헌터들이 소속되어 있는 파벌입니다. 성좌를 연구하고 시스템에 대하여 분석하며 헌터들의 전투 능력을 발전시키기 위해서 가르치는 학파입니다. 현대 기술뿐만 아니라 마법, 신비 강의도 함께 진행하며 기초 체력 단련을 위한 필수 과정을 운영하고 있습니다.", depts: ["현대오컬트학과", "천문관측학과", "육체단련학과", "이능공학과", "이계정보분석학과", "이능단련학과"] },
            { name: "Asphodel (아스포델)", theme: "theme-asphodel", desc: "삶과 죽음이 뒤섞여 있는 회색 세계의 기술을 다룹니다. 제압 중심의 의학과 장례 주술이 발달했으며, 타락자를 제압하여 강제로 무아로 되돌리는 장의사들의 기술과 종교적 예법을 계승하고 있습니다.", depts: ["주술학과", "사령학과", "영매학과", "무술학과", "장례학과", "성물제작과"] },
            { name: "Hong-Yeong (홍영/紅英)", theme: "theme-hongyeong", desc: "도술, 선술, 주술, 음양술, 무공 등 주로 동양적인 기술을 다루는 학파이며 굉장히 공격적인 성향이 강합니다. '배부른 맹수' 특유의 나른함 속에 수라의 본능을 숨기고 있으며 선천적인 힘을 제어하는 법을 가르칩니다.", depts: ["주술학과", "선술학과", "무술학과", "연단학과", "야금학과", "신비학과"] }
        ];

        const tooltipInfo = { "주술학과": "주변에 널리 퍼진 혼을 매개로 신비한 힘을 발현하거나 영혼을 억제합니다.", "영매학과": "주변의 흩어진 넋을 읽어 다양한 것을 경험하고 궤적을 탐지합니다.", "장례학과": "끝의 신에 대한 종교적 마음가짐이나 무아로 인도하는 교리를 배웁니다.", "무술학과": "육체와 혼을 일체화하여 초인적인 힘을 내거나 적을 무력화합니다.", "성물제작과": "무아로 돌아간 혼들과 신비한 재료로 특별한 도구를 만들어냅니다.", "사령학과": "흩어지지 않은 넋의 힘을 빌려 도움을 구하고 생태를 연구합니다.", "현대오컬트학과": "시스템 이후 발견된 오컬트 현상을 공학적으로 분석합니다.", "천문관측학과": "차원 균열과 성좌의 움직임을 별자리의 궤적으로 관측합니다.", "육체단련학과": "이능을 담아내기 위한 헌터의 신체적 한계를 돌파합니다.", "이능공학과": "이계 에너지를 도구에 결합하는 최첨단 공학을 연구합니다.", "이계정보분석학과": "라비린토스 내부 데이터를 해독하고 탐사 전략을 수립합니다.", "이능단련학과": "개인이 각성한 고유 이능의 출력을 극대화하고 제어합니다.", "선술학과": "천지의 기운을 다스려 도를 닦고 경지를 탐구합니다.", "연단학과": "영약을 제조하여 신체를 강화하거나 치유하는 고대 기술을 다룹니다.", "야금학과": "영석과 이계 금속을 제련하여 신물을 제작하는 대장기술입니다.", "신비학과": "선천적으로 타고난 이형의 힘이나 혈통적 신비를 제어합니다." };

        /* [Logic: 렌더링 함수] */
        function renderAll() {
            const realmsContent = document.getElementById('realms-content');
            realmsData.forEach(r => { realmsContent.innerHTML += `<div class="doc-folder ${r.theme}"><div class="doc-folder-header" onclick="this.parentElement.classList.toggle('active')"><span>${r.name}</span><span>▼</span></div><div class="doc-content">${r.content}</div></div>`; });
            const academyContent = document.getElementById('academy-content');
            academyData.forEach(a => { academyContent.innerHTML += `<div class="doc-folder ${a.theme || ''}"><div class="doc-folder-header" onclick="this.parentElement.classList.toggle('active')"><span>${a.name}</span><span>📂 Open</span></div><div class="doc-content">${a.content}</div></div>`; });
            const rankBody = document.getElementById('rank-body');
            const rankData = [ { label: "S", class: "초월자", def: "자신만의 질서를 세운 자.", style: "color:#a67c00; font-weight:900;" }, { label: "A", class: "초월자의 씨앗", def: "별을 향해 손을 뻗는 자." }, { label: "B", class: "상급 초인", def: "탐사를 넘어 그 앞을 바라보는 자." }, { label: "C", class: "중급 초인", def: "탐사에 능숙해진 탐사자." }, { label: "D", class: "하급 초인", def: "탐사에 익숙해진 탐사자." }, { label: "E", class: "운동선수 수준", def: "조금 배운 탐사자." }, { label: "F", class: "일반인", def: "막 배우기 시작한 탐사자." } ];
            rankData.forEach(r => { rankBody.innerHTML += `<tr><td class="rank-label" style="${r.style}">${r.label}</td><td style="font-weight:900;">${r.class}</td><td>${r.def}</td></tr>`; });
            const timeline = document.getElementById('history-timeline');
            historyData.forEach(h => { timeline.innerHTML += `<div class="event"><span class="event-date">${h.date}</span><span class="event-title">${h.title}</span><p style="color:#333; font-weight:500;">${h.content}</p></div>`; });
            const glossaryGrid = document.getElementById('glossary-grid');
            glossaryData.forEach(g => { glossaryGrid.innerHTML += `<div class="glossary-item" onclick="this.classList.toggle('open')"><div class="glossary-trigger"><span>[📜] ${g.term}</span></div><div class="glossary-body">${g.desc}</div></div>`; });
            const factionContent = document.getElementById('faction-content');
            factionData.forEach(f => {
                let deptHTML = f.depts.map(d => `<li class="dept-card">${d}<div class="tooltip">${tooltipInfo[d]}</div></li>`).join('');
                factionContent.innerHTML += `<div class="doc-folder ${f.theme}"><div class="doc-folder-header" onclick="this.parentElement.classList.toggle('active')"><span>${f.name}</span><span>📁 Dossier</span></div><div class="doc-content"><p style="background:#f9f9f9; padding:25px; border-left:10px solid; border-radius:4px; margin-bottom:30px;">${f.desc}</p><ul class="dept-grid">${deptHTML}</ul></div></div>`;
            });
        }

        window.addEventListener('mousemove', (e) => {
            const moveX = (e.clientX - window.innerWidth / 2) * 0.01;
            const moveY = (e.clientY - window.innerHeight / 2) * 0.01;
            const bg = document.getElementById('parallax-bg');
            if(bg) bg.style.transform = `translate(${moveX}px, ${moveY}px)`;
        });

        function enterAcademy() { 
            const overlay = document.getElementById('intro-overlay');
            if(overlay) overlay.classList.add('fade-out');
            document.body.classList.add('entered'); 
            showSection('home'); 
            renderAll(); 
        }
        function showSection(id) { document.querySelectorAll('main section').forEach(s => s.classList.remove('active')); document.querySelectorAll('nav a').forEach(a => a.classList.remove('active')); document.getElementById(id).classList.add('active'); const btn = document.getElementById('nav-' + id); if(btn) btn.classList.add('active'); }
    </script>
</body>
</html>
